[workspace]
resolver = "2"
members = [
    "lessons/*/project",
    "lessons/1-caesar-cipher/lesson-*/project",
    "lessons/2-contact-book/lesson-*/project",
    "lessons/3-cipher-cracker/lesson-*/project",
    "lessons/4-ball-moves/lesson-*/project",
    "lessons/5-many-bodies/lesson-*/project",
    "lessons/6-collisions/lesson-*/project",
    "lessons/7-pong/lesson-*/project",
    "lessons/8-peggle/lesson-*/project",
    "lessons/9-stable-world/lesson-*/project",
    "lessons/10-boxes/lesson-*/project",
    "lessons/networking/lesson-*/project",
    "capstones/*",
]

[workspace.package]
edition = "2021"
version = "0.1.0"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
owo-colors = "4"
toml = "0.8"
notify = "6"
notify-debouncer-mini = "0.4"
ratatui = "0.29"
crossterm = "0.28"
macroquad = "0.4"
# rapier2d added for Project 8 — Peggle. Run `rbb-admin vendor-sync` after this change.
rapier2d = { version = "0.22", features = ["crossbeam-channel"] }
# reqwest added for networking lessons. Run `rbb-admin vendor-sync` after this change.
reqwest = { version = "0.12", features = ["blocking", "json"] }
